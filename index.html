<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔍 Anthropic Leak - Code Explorer</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23eab308'><path d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            padding-bottom: 80px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 { font-size: 1.5rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .header h1 i { color: #eab308; }
        .header p { color: #64748b; font-size: 0.8rem; margin: 8px 0 16px; }
        .search-box {
            width: 100%;
            padding: 14px 18px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.9rem;
        }
        .search-box:focus { outline: none; border-color: #eab308; background: white; }
        .stats { background: #f1f5f9; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; display: inline-block; margin-top: 12px; }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 10px 18px;
            margin-bottom: 16px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c5f2d;
            cursor: pointer;
        }
        .folder-item, .file-item {
            background: white;
            border-radius: 20px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .folder-header, .file-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .folder-header:active, .file-header:active { background: #f8fafc; }
        .folder-header i, .file-header i { font-size: 1.2rem; width: 28px; }
        .folder-name, .file-name { flex: 1; font-weight: 500; font-size: 0.9rem; color: #1e293b; }
        .file-size { font-size: 0.65rem; color: #94a3b8; background: #f1f5f9; padding: 4px 10px; border-radius: 30px; }
        .folder-content { display: none; border-top: 1px solid #f1f5f9; background: #fefefe; padding: 8px 0; }
        .folder-content.open { display: block; }
        .code-view {
            background: #0d1117;
            border-radius: 24px;
            padding: 0;
            overflow: hidden;
            margin-top: 16px;
            border: 1px solid #2d2d3a;
        }
        .code-view pre {
            margin: 0;
            padding: 20px;
            overflow-x: auto;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
        }
        .loading { color: #94a3b8; text-align: center; padding: 40px; }
        .footer { text-align: center; color: #94a3b8; font-size: 0.65rem; margin-top: 30px; }
        @media (max-width: 600px) { body { padding: 12px; } .code-view pre { font-size: 10px; padding: 14px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-code"></i> Anthropic Leak</h1>
            <p>Exploration du code source de Claude Code</p>
            <input type="text" class="search-box" id="search" placeholder="🔍 Rechercher un fichier ou dossier..." autocomplete="off">
            <div class="stats" id="stats">📄 Chargement...</div>
        </div>
        <div id="browserView"></div>
        <div id="codeView" style="display: none;">
            <div class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Retour</div>
            <div class="code-view" id="codeContent"></div>
        </div>
        <div class="footer"><i class="fas fa-github"></i> exploration interactive | <i class="fas fa-code"></i> syntax highlighting</div>
    </div>
    <script>
        let fileData = {};
        let fileTree = {};
        let scrollPosition = 0;

        async function loadData() {
            try {
                const res = await fetch('data.json');
                fileData = await res.json();
                const files = Object.keys(fileData);
                document.getElementById('stats').innerHTML = `📄 ${files.length} fichiers source • 📁 ${new Set(files.map(f => f.split('/')[0])).size} dossiers • ${(Object.values(fileData).join('').length / 1024 / 1024).toFixed(2)} MB`;
                buildTree(files);
                renderBrowser();
                restoreScroll();
            } catch(e) {
                document.getElementById('stats').innerHTML = '❌ Erreur de chargement';
            }
        }

        function buildTree(files) {
            fileTree = {};
            for (const file of files) {
                const parts = file.split('/');
                let current = fileTree;
                for (let i = 0; i < parts.length - 1; i++) {
                    if (!current[parts[i]]) current[parts[i]] = {};
                    current = current[parts[i]];
                }
                const filename = parts[parts.length - 1];
                if (!current._files) current._files = [];
                current._files.push({ name: filename, path: file });
            }
        }

        function renderBrowser() {
            const container = document.getElementById('browserView');
            container.innerHTML = '';
            renderNode(fileTree, container);
        }

        function renderNode(node, container, level = 0) {
            const folders = Object.keys(node).filter(k => k !== '_files').sort();
            const files = node._files || [];

            for (const folder of folders) {
                const folderId = 'f_' + Math.random().toString(36).substr(2, 8);
                const div = document.createElement('div');
                div.className = 'folder-item';
                div.setAttribute('data-search', folder.toLowerCase());
                div.innerHTML = `
                    <div class="folder-header" onclick="toggleFolder('${folderId}', this)">
                        <i class="fas fa-folder"></i>
                        <span class="folder-name">${folder}</span>
                        <i class="fas fa-chevron-down" style="font-size: 0.7rem; color: #94a3b8;"></i>
                    </div>
                    <div class="folder-content" id="${folderId}"></div>
                `;
                container.appendChild(div);
                const sub = document.getElementById(folderId);
                renderNode(node[folder], sub, level + 1);
            }

            for (const file of files.sort((a,b) => a.name.localeCompare(b.name))) {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.setAttribute('data-search', file.name.toLowerCase());
                div.setAttribute('data-path', file.path);
                div.innerHTML = `
                    <div class="file-header" onclick="openFile('${file.path}')">
                        <i class="fas fa-file-code"></i>
                        <span class="file-name">${file.name}</span>
                        <span class="file-size">${file.name.split('.').pop().toUpperCase()} • ${getFileSize(file.path)}</span>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        function getFileSize(path) {
            const content = fileData[path];
            if (!content) return '0 KB';
            const kb = content.length / 1024;
            if (kb < 1) return `${content.length} B`;
            if (kb < 1024) return `${kb.toFixed(1)} KB`;
            return `${(kb/1024).toFixed(1)} MB`;
        }

        window.toggleFolder = (id, header) => {
            const content = document.getElementById(id);
            content.classList.toggle('open');
            const icon = header.querySelector('.fa-chevron-down');
            if (icon) {
                icon.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        };

        function openFile(path) {
            scrollPosition = window.scrollY;
            document.getElementById('browserView').style.display = 'none';
            document.getElementById('codeView').style.display = 'block';
            const codeDiv = document.getElementById('codeContent');
            const content = fileData[path];
            if (content) {
                const lines = content.split('\n').length;
                const ext = path.split('.').pop();
                const language = ext === 'ts' || ext === 'tsx' ? 'typescript' : ext === 'js' ? 'javascript' : ext === 'json' ? 'json' : ext === 'md' ? 'markdown' : '';
                const highlighted = language ? hljs.highlight(content, { language }).value : escapeHtml(content);
                codeDiv.innerHTML = `<pre><code class="language-${language}">${highlighted}</code><div style="text-align:right; font-size:0.6rem; color:#6b7280; padding:8px 12px; border-top:1px solid #2d2d3a;">📄 ${lines} lignes • ${getFileSize(path)}</div></pre>`;
            } else {
                codeDiv.innerHTML = '<div class="loading">❌ Fichier introuvable</div>';
            }
        }

        function goBack() {
            document.getElementById('browserView').style.display = 'block';
            document.getElementById('codeView').style.display = 'none';
            setTimeout(() => window.scrollTo(0, scrollPosition), 50);
        }

        function escapeHtml(text) {
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function restoreScroll() {
            if (scrollPosition > 0) {
                window.scrollTo(0, scrollPosition);
                scrollPosition = 0;
            }
        }

        // Recherche améliorée (fichiers + dossiers)
        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.file-item, .folder-item');
            items.forEach(item => {
                const searchText = item.getAttribute('data-search') || item.innerText.toLowerCase();
                if (term === '') {
                    item.style.display = '';
                    // Réouvrir les dossiers parents si besoin ?
                } else {
                    item.style.display = searchText.includes(term) ? '' : 'none';
                }
            });
        });

        loadData();
    </script>
</body>
</html>
