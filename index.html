<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔍 Anthropic Leak - Code Explorer</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23eab308'><path d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 0;
            padding-bottom: 80px;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 16px; }
        
        /* Header fixe */
        .header {
            background: white;
            border-radius: 0 0 28px 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
        }
        .header h1 { font-size: 1.5rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .header h1 i { color: #eab308; }
        .header p { color: #64748b; font-size: 0.8rem; margin: 8px 0 16px; }
        .search-box {
            width: 100%;
            padding: 14px 18px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 60px;
            font-size: 0.9rem;
        }
        .search-box:focus { outline: none; border-color: #eab308; background: white; }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        .stat-badge {
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #475569;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 10px 18px;
            margin-bottom: 16px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c5f2d;
            cursor: pointer;
        }
        .folder-item, .file-item {
            background: white;
            border-radius: 20px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .folder-header, .file-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .folder-header:active, .file-header:active { background: #f8fafc; }
        .folder-header i, .file-header i { font-size: 1.2rem; width: 28px; }
        .folder-name, .file-name { flex: 1; font-weight: 500; font-size: 0.9rem; color: #1e293b; }
        .file-size { font-size: 0.65rem; color: #94a3b8; background: #f1f5f9; padding: 4px 10px; border-radius: 30px; }
        .folder-content { display: none; border-top: 1px solid #f1f5f9; background: #fefefe; padding: 8px 0; }
        .folder-content.open { display: block; }
        
        /* Code viewer avec numéros de lignes */
        .code-view {
            background: #0d1117;
            border-radius: 24px;
            overflow: hidden;
            margin-top: 16px;
            border: 1px solid #2d2d3a;
        }
        .code-wrapper {
            display: flex;
            overflow-x: auto;
        }
        .line-numbers {
            background: #0a0c10;
            color: #6e7681;
            text-align: right;
            padding: 20px 12px;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            user-select: none;
            border-right: 1px solid #2d2d3a;
        }
        .line-numbers div {
            padding: 0 4px;
        }
        .code-content {
            flex: 1;
            overflow-x: auto;
        }
        .code-content pre {
            margin: 0;
            padding: 20px;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            background: #0d1117;
        }
        .code-content code {
            display: block;
        }
        .file-footer {
            text-align: right;
            font-size: 0.6rem;
            color: #6b7280;
            padding: 8px 16px;
            border-top: 1px solid #2d2d3a;
            background: #0a0c10;
        }
        .loading { color: #94a3b8; text-align: center; padding: 40px; }
        .footer { text-align: center; color: #94a3b8; font-size: 0.65rem; margin-top: 30px; padding: 16px; }
        @media (max-width: 600px) {
            .container { padding: 12px; }
            .line-numbers, .code-content pre { font-size: 10px; }
            .line-numbers { padding: 14px 8px; }
            .code-content pre { padding: 14px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container" style="padding:0;">
            <h1><i class="fas fa-code"></i> Anthropic Leak</h1>
            <p>Exploration du code source de Claude Code</p>
            <input type="text" class="search-box" id="search" placeholder="🔍 Rechercher un fichier ou dossier..." autocomplete="off">
            <div class="stats" id="stats">
                <span class="stat-badge">📄 Chargement...</span>
            </div>
        </div>
    </div>
    <div class="container">
        <div id="browserView"></div>
        <div id="codeView" style="display: none;">
            <div class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Retour</div>
            <div class="code-view" id="codeContent"></div>
        </div>
        <div class="footer"><i class="fas fa-github"></i> exploration interactive | <i class="fas fa-code"></i> syntax highlighting | <i class="fas fa-list-ol"></i> numéros de lignes</div>
    </div>

    <script>
        let fileData = {};
        let fileTree = {};
        let scrollPosition = 0;

        async function loadData() {
            try {
                const res = await fetch('data.json');
                fileData = await res.json();
                const files = Object.keys(fileData);
                const totalSize = (Object.values(fileData).join('').length / 1024 / 1024).toFixed(2);
                document.getElementById('stats').innerHTML = `
                    <span class="stat-badge">📄 ${files.length} fichiers</span>
                    <span class="stat-badge">📁 ${new Set(files.map(f => f.split('/')[0])).size} dossiers</span>
                    <span class="stat-badge">💾 ${totalSize} MB</span>
                `;
                buildTree(files);
                renderBrowser();
                restoreScroll();
            } catch(e) {
                document.getElementById('stats').innerHTML = '<span class="stat-badge">❌ Erreur de chargement</span>';
            }
        }

        function buildTree(files) {
            fileTree = {};
            for (const file of files) {
                const parts = file.split('/');
                let current = fileTree;
                for (let i = 0; i < parts.length - 1; i++) {
                    if (!current[parts[i]]) current[parts[i]] = {};
                    current = current[parts[i]];
                }
                const filename = parts[parts.length - 1];
                if (!current._files) current._files = [];
                current._files.push({ name: filename, path: file });
            }
        }

        function renderBrowser() {
            const container = document.getElementById('browserView');
            container.innerHTML = '';
            renderNode(fileTree, container);
        }

        function renderNode(node, container) {
            const folders = Object.keys(node).filter(k => k !== '_files').sort();
            const files = node._files || [];

            for (const folder of folders) {
                const folderId = 'f_' + Math.random().toString(36).substr(2, 8);
                const div = document.createElement('div');
                div.className = 'folder-item';
                div.setAttribute('data-search', folder.toLowerCase());
                div.innerHTML = `
                    <div class="folder-header" onclick="toggleFolder('${folderId}', this)">
                        <i class="fas fa-folder"></i>
                        <span class="folder-name">${folder}</span>
                        <i class="fas fa-chevron-down" style="font-size: 0.7rem; color: #94a3b8;"></i>
                    </div>
                    <div class="folder-content" id="${folderId}"></div>
                `;
                container.appendChild(div);
                const sub = document.getElementById(folderId);
                renderNode(node[folder], sub);
            }

            for (const file of files.sort((a,b) => a.name.localeCompare(b.name))) {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.setAttribute('data-search', file.name.toLowerCase());
                div.setAttribute('data-path', file.path);
                const lines = fileData[file.path] ? fileData[file.path].split('\n').length : 0;
                div.innerHTML = `
                    <div class="file-header" onclick="openFile('${file.path}')">
                        <i class="fas fa-file-code"></i>
                        <span class="file-name">${file.name}</span>
                        <span class="file-size">📄 ${lines} lignes • ${file.name.split('.').pop().toUpperCase()}</span>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        window.toggleFolder = (id, header) => {
            const content = document.getElementById(id);
            content.classList.toggle('open');
            const icon = header.querySelector('.fa-chevron-down');
            if (icon) {
                icon.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        };

        function openFile(path) {
            scrollPosition = window.scrollY;
            document.getElementById('browserView').style.display = 'none';
            document.getElementById('codeView').style.display = 'block';
            const codeDiv = document.getElementById('codeContent');
            const content = fileData[path];
            if (content) {
                const lines = content.split('\n');
                const ext = path.split('.').pop();
                const language = ext === 'ts' || ext === 'tsx' ? 'typescript' : ext === 'js' ? 'javascript' : ext === 'json' ? 'json' : ext === 'md' ? 'markdown' : '';
                const highlighted = language ? hljs.highlight(content, { language }).value : escapeHtml(content);
                
                // Générer les numéros de lignes
                let lineNumbersHtml = '';
                for (let i = 1; i <= lines.length; i++) {
                    lineNumbersHtml += `<div>${i}</div>`;
                }
                
                codeDiv.innerHTML = `
                    <div class="code-wrapper">
                        <div class="line-numbers">${lineNumbersHtml}</div>
                        <div class="code-content">
                            <pre><code class="language-${language}">${highlighted}</code></pre>
                        </div>
                    </div>
                    <div class="file-footer">
                        📄 ${lines.length} lignes • ${(content.length / 1024).toFixed(1)} KB • ${path}
                    </div>
                `;
            } else {
                codeDiv.innerHTML = '<div class="loading">❌ Fichier introuvable</div>';
            }
        }

        function goBack() {
            document.getElementById('browserView').style.display = 'block';
            document.getElementById('codeView').style.display = 'none';
            setTimeout(() => window.scrollTo(0, scrollPosition), 50);
        }

        function escapeHtml(text) {
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function restoreScroll() {
            if (scrollPosition > 0) {
                window.scrollTo(0, scrollPosition);
                scrollPosition = 0;
            }
        }

        // Recherche
        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.file-item, .folder-item');
            items.forEach(item => {
                const searchText = item.getAttribute('data-search') || item.innerText.toLowerCase();
                if (term === '') {
                    item.style.display = '';
                } else {
                    item.style.display = searchText.includes(term) ? '' : 'none';
                }
            });
        });

        loadData();
    </script>
</body>
</html>
